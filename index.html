<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>PNZ Marketing Hosting</title>
  <style>
    :root { color-scheme: dark; }
    * { margin: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #000; color: #fff;
      min-height: 100vh; display: grid; place-items: center; text-align: center;
    }
    .wrap { padding: 2rem; }
    .dot { color: #73C20D; }
    h1 { font-size: 1.4rem; letter-spacing: .28em; text-transform: uppercase; font-weight: 700; }
    p { color: #8c8c8c; margin-top: .75rem; font-size: .85rem; letter-spacing: .04em; }
    .bar { width: 64px; height: 6px; background: #73C20D; border-radius: 3px; margin: 1.4rem auto 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>PNZ <span class="dot">·</span> Marketing Hosting</h1>
    <p>Host de mídia dos loops de conteúdo. Uso interno.</p>
    <div class="bar"></div>
  </div>
</body>
</html>
